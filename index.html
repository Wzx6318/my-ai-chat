<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仿微信 AI 助手 Pro</title>
    <style>
        :root {
            --wechat-green: #07C160;
            --bg-color: #EDEDED;
            --white: #FFFFFF;
            --text-main: #191919;
            --text-sub: #B2B2B2;
            --border: #E5E5E5;
            --msg-self: #95EC69;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 450px; height: 100%; background: var(--bg-color); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* 顶部导航 */
        header { height: 50px; background: var(--bg-color); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-weight: bold; font-size: 17px; color: var(--text-main); border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 10; }
        .header-btn { font-size: 22px; cursor: pointer; color: var(--text-main); width: 30px; text-align: center; }
        .back-btn { display: none; font-size: 14px; width: auto; }

        main { flex: 1; overflow-y: auto; position: relative; }
        .page { display: none; height: 100%; flex-direction: column; background: var(--bg-color); }
        .page.active { display: flex; }

        /* 聊天列表 */
        .chat-item { display: flex; align-items: center; padding: 12px 15px; background: var(--white); border-bottom: 1px solid var(--border); cursor: pointer; }
        .chat-item:active { background: #D9D9D9; }
        .avatar { width: 48px; height: 48px; border-radius: 6px; background: #ccc; object-fit: cover; flex-shrink: 0; }
        .chat-info { margin-left: 12px; flex: 1; overflow: hidden; }
        .chat-name { font-size: 16px; color: var(--text-main); margin-bottom: 4px; }
        .chat-msg { font-size: 13px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 聊天详情 */
        .message-list { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; align-items: flex-start; max-width: 85%; }
        .msg-row.self { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 10px 14px; border-radius: 6px; font-size: 15px; line-height: 1.5; word-break: break-all; background: var(--white); color: var(--text-main); margin: 0 10px; white-space: pre-wrap; }
        .msg-row.self .msg-bubble { background: var(--msg-self); }
        .input-area { background: #F7F7F7; padding: 10px; display: flex; align-items: center; border-top: 1px solid var(--border); }
        .input-area input { flex: 1; height: 36px; border-radius: 4px; border: none; padding: 0 10px; font-size: 15px; background: var(--white); }
        .send-btn { margin-left: 10px; padding: 6px 15px; background: var(--wechat-green); color: white; border: none; border-radius: 4px; font-size: 14px; opacity: 0.6; pointer-events: none; }
        .send-btn.active { opacity: 1; pointer-events: auto; }
        .typing { font-size: 12px; color: var(--text-sub); padding: 0 15px 5px; display: none; }

        /* 设置 & 表单通用样式 */
        .form-group { background: var(--white); margin-top: 10px; padding: 0 15px; }
        .form-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); font-size: 16px; }
        .form-item:last-child { border-bottom: none; }
        .form-item label { color: var(--text-main); flex-shrink: 0; margin-right: 10px; }
        .form-item input, .form-item textarea { border: none; text-align: right; font-size: 15px; color: var(--text-sub); width: 70%; background: transparent; resize: none; }
        .form-item textarea { text-align: left; width: 100%; margin-top: 5px; font-size: 14px; line-height: 1.4; }
        .form-item.full { flex-direction: column; align-items: flex-start; }
        
        /* 头像选择器样式 */
        .avatar-picker { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .avatar-picker img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: #eee; }
        .avatar-picker span { font-size: 14px; color: var(--text-sub); }
        
        .action-btn { margin: 20px 15px; padding: 12px; background: var(--wechat-green); color: white; border: none; border-radius: 6px; font-size: 16px; width: calc(100% - 30px); cursor: pointer; }
        .danger-btn { background: #FA5151; }

        /* 弹窗 */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: var(--white); width: 90%; max-height: 85vh; border-radius: 8px; padding: 20px; overflow-y: auto; }
        .modal h3 { margin-bottom: 15px; font-size: 17px; text-align: center; }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
        .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
        .btn-cancel { background: #F2F2F2; color: var(--text-main); }
        .btn-confirm { background: var(--wechat-green); color: white; }

        footer { height: 55px; background: #F7F7F7; border-top: 1px solid var(--border); display: flex; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sub); font-size: 10px; cursor: pointer; }
        .tab.active { color: var(--wechat-green); }
        .tab-icon { font-size: 24px; margin-bottom: 2px; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="header-btn back-btn" id="backBtn" onclick="goBack()">〈</div>
        <span id="pageTitle">微信</span>
        <div class="header-btn" id="addBtn" onclick="openAddFriendModal()">＋</div>
    </header>

    <main>
        <!-- 聊天列表 -->
        <div id="page-chat-list" class="page active">
            <div id="chatListContainer"></div>
        </div>

        <!-- 聊天详情 -->
        <div id="page-chat-detail" class="page">
            <div class="message-list" id="messageList"></div>
            <div class="typing" id="typingIndicator">对方正在输入...</div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="输入消息..." oninput="toggleSendBtn()">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>

        <!-- 设置页 -->
        <div id="page-settings" class="page">
            <div class="form-group">
                <div class="form-item">
                    <label>我的头像</label>
                    <div class="avatar-picker" onclick="triggerUpload('myAvatarUpload')">
                        <img id="myAvatarPreview" src="">
                        <span>点击更换</span>
                    </div>
                    <input type="file" id="myAvatarUpload" accept="image/*" style="display:none" onchange="handleImageUpload(this, 'myAvatarPreview', 'myProfile.avatar')">
                </div>
                <div class="form-item">
                    <label>我的昵称</label>
                    <input type="text" id="myNameInput" placeholder="我">
                </div>
            </div>
            <div class="form-group">
                <div class="form-item">
                    <label>API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="sk-...">
                </div>
                <div class="form-item">
                    <label>模型名称</label>
                    <input type="text" id="modelNameInput" placeholder="Qwen/Qwen2.5-7B-Instruct">
                </div>
            </div>
            <button class="action-btn" onclick="saveSettings()">保存设置</button>
            <button class="action-btn danger-btn" onclick="clearAllData()">清除所有数据</button>
        </div>
    </main>

    <footer id="mainFooter">
        <div class="tab active" onclick="switchTab('chat')"><div class="tab-icon">💬</div><span>微信</span></div>
        <div class="tab" onclick="switchTab('settings')"><div class="tab-icon">⚙️</div><span>设置</span></div>
    </footer>

    <!-- 添加/编辑好友弹窗 -->
    <div class="modal-overlay" id="friendModal">
        <div class="modal">
            <h3 id="friendModalTitle">添加好友</h3>
            <div class="form-group" style="margin-top:0; border:1px solid var(--border); border-radius:6px;">
                <div class="form-item">
                    <label>头像</label>
                    <div class="avatar-picker" onclick="triggerUpload('friendAvatarUpload')">
                        <img id="friendAvatarPreview" src="">
                        <span>选择图片</span>
                    </div>
                    <input type="file" id="friendAvatarUpload" accept="image/*" style="display:none" onchange="handleImageUpload(this, 'friendAvatarPreview', 'tempFriend.avatar')">
                </div>
                <div class="form-item">
                    <label>昵称</label>
                    <input type="text" id="friendNameInput" placeholder="例如：苏东坡">
                </div>
                <div class="form-item">
                    <label>备注</label>
                    <input type="text" id="friendRemarkInput" placeholder="显示在列表的名称">
                </div>
                <div class="form-item full">
                    <label>🎭 人设 (System Prompt)</label>
                    <textarea id="friendPersonaInput" rows="4" placeholder="例如：你是北宋文学家苏轼，性格豪放豁达，喜欢用古文和白话结合的方式聊天，经常提到美食和酒..."></textarea>
                </div>
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeFriendModal()">取消</button>
                <button class="btn-confirm" onclick="saveFriend()">确定</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ================= 状态管理 =================
    const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23ddd' width='100' height='100'/%3E%3Ctext x='50' y='55' font-size='40' text-anchor='middle' fill='%23999'%3E%3F%3C/text%3E%3C/svg%3E";
    
    let state = {
        myProfile: { name: "我", avatar: "" },
        apiConfig: { key: "", model: "Qwen/Qwen2.5-7B-Instruct" },
        friends: [],
        currentChatId: null,
        editingFriendId: null
    };

    // 临时存储正在编辑的好友数据
    let tempFriend = { avatar: "" };

    function init() {
        const saved = localStorage.getItem('wx_clone_pro_data');
        if (saved) {
            try { Object.assign(state, JSON.parse(saved)); } catch(e) {}
        }
        // 首次使用默认数据
        if (state.friends.length === 0) {
            state.friends = [{
                id: Date.now(), name: "硅基助手", remark: "硅基助手", 
                avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=AI",
                persona: "你是一个友好的AI助手，回答简洁专业。",
                lastMsg: "你好！我是你的AI助手，有什么可以帮你的？",
                history: []
            }];
        }
        if (!state.myProfile.avatar) state.myProfile.avatar = "https://api.dicebear.com/7.x/avataaars/svg?seed=Me";
        
        renderChatList();
        loadSettingsUI();
    }

    function saveData() {
        try {
            localStorage.setItem('wx_clone_pro_data', JSON.stringify(state));
        } catch(e) {
            alert("存储空间不足！请删除部分好友或清除数据后重试。（Base64图片较占空间）");
        }
    }

    // ================= 图片上传处理 =================
    function triggerUpload(inputId) {
        document.getElementById(inputId).click();
    }

    function handleImageUpload(input, previewId, statePath) {
        const file = input.files[0];
        if (!file) return;
        
        // 限制大小 500KB，避免localStorage爆掉
        if (file.size > 500 * 1024) {
            alert("图片太大了！请选择小于500KB的图片，或使用在线URL。");
            input.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result;
            document.getElementById(previewId).src = base64;
            
            // 动态写入state
            const keys = statePath.split('.');
            if (keys.length === 2 && keys[0] === 'tempFriend') {
                tempFriend[keys[1]] = base64;
            } else if (keys.length === 2) {
                state[keys[0]][keys[1]] = base64;
            }
        };
        reader.readAsDataURL(file);
    }

    // ================= 导航 =================
    function switchTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('mainFooter').style.display = 'flex';
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('addBtn').style.display = tab === 'chat' ? 'block' : 'none';

        if (tab === 'chat') {
            document.getElementById('page-chat-list').classList.add('active');
            document.querySelector('.tab:nth-child(1)').classList.add('active');
            document.getElementById('pageTitle').innerText = "微信";
        } else {
            document.getElementById('page-settings').classList.add('active');
            document.querySelector('.tab:nth-child(2)').classList.add('active');
            document.getElementById('pageTitle').innerText = "设置";
        }
    }

    function openChat(friendId) {
        state.currentChatId = friendId;
        const friend = state.friends.find(f => f.id === friendId);
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-chat-detail').classList.add('active');
        document.getElementById('mainFooter').style.display = 'none';
        document.getElementById('backBtn').style.display = 'block';
        document.getElementById('addBtn').style.display = 'none';
        document.getElementById('pageTitle').innerText = friend.remark || friend.name;
        renderMessages();
        document.getElementById('msgInput').value = '';
        toggleSendBtn();
    }

    function goBack() {
        state.currentChatId = null;
        switchTab('chat');
        renderChatList();
    }

    // ================= 聊天列表 =================
    function renderChatList() {
        const container = document.getElementById('chatListContainer');
        if (state.friends.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#999;font-size:14px;">暂无好友<br>点击右上角 ＋ 添加AI好友</div>';
            return;
        }
        container.innerHTML = state.friends.map(f => `
            <div class="chat-item" onclick="openChat(${f.id})">
                <img class="avatar" src="${f.avatar || DEFAULT_AVATAR}" alt="">
                <div class="chat-info">
                    <div class="chat-name">${f.remark || f.name}</div>
                    <div class="chat-msg">${f.lastMsg || ''}</div>
                </div>
            </div>
        `).join('');
    }

    // ================= 聊天详情 =================
    function renderMessages() {
        const friend = state.friends.find(f => f.id === state.currentChatId);
        if (!friend) return;
        const list = document.getElementById('messageList');
        list.innerHTML = friend.history.map(msg => `
            <div class="msg-row ${msg.role === 'user' ? 'self' : ''}">
                <img class="avatar" style="width:40px;height:40px;cursor:pointer;" 
                     src="${msg.role === 'user' ? state.myProfile.avatar : friend.avatar}" 
                     onclick="${msg.role === 'assistant' ? `openEditFriendModal(${friend.id})` : ''}"
                     onerror="this.src='${DEFAULT_AVATAR}'">
                <div class="msg-bubble">${escapeHtml(msg.content)}</div>
            </div>
        `).join('');
        list.scrollTop = list.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function toggleSendBtn() {
        const val = document.getElementById('msgInput').value.trim();
        document.getElementById('sendBtn').classList.toggle('active', !!val);
    }

    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !state.currentChatId) return;

        const friend = state.friends.find(f => f.id === state.currentChatId);
        friend.history.push({ role: 'user', content: text });
        friend.lastMsg = text;
        input.value = '';
        toggleSendBtn();
        renderMessages();
        saveData();

        if (!state.apiConfig.key) { alert("请先在【设置】中填写 API Key"); return; }

        document.getElementById('typingIndicator').style.display = 'block';
        try {
            // 🔥 关键：注入人设 System Prompt
            const messages = [];
            if (friend.persona) {
                messages.push({ role: 'system', content: friend.persona });
            }
            // 取最近20条历史
            messages.push(...friend.history.slice(-20).map(m => ({
                role: m.role === 'user' ? 'user' : 'assistant', content: m.content
            })));

            const res = await fetch("https://api.siliconflow.cn/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${state.apiConfig.key}` },
                body: JSON.stringify({ model: state.apiConfig.model, messages, stream: false })
            });
            if (!res.ok) throw new Error(`API ${res.status}`);
            const data = await res.json();
            const reply = data.choices[0].message.content;

            friend.history.push({ role: 'assistant', content: reply });
            friend.lastMsg = reply.length > 20 ? reply.substring(0, 20) + '...' : reply;
        } catch (err) {
            friend.history.push({ role: 'assistant', content: `[错误] ${err.message}` });
            friend.lastMsg = "[请求失败]";
        } finally {
            document.getElementById('typingIndicator').style.display = 'none';
            renderMessages();
            saveData();
        }
    }

    document.getElementById('msgInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    // ================= 好友管理（添加/编辑）=================
    function openAddFriendModal() {
        state.editingFriendId = null;
        tempFriend = { avatar: "", name: "", remark: "", persona: "" };
        document.getElementById('friendModalTitle').innerText = "添加AI好友";
        document.getElementById('friendAvatarPreview').src = DEFAULT_AVATAR;
        document.getElementById('friendNameInput').value = "";
        document.getElementById('friendRemarkInput').value = "";
        document.getElementById('friendPersonaInput').value = "";
        document.getElementById('friendModal').style.display = 'flex';
    }

    function openEditFriendModal(friendId) {
        const friend = state.friends.find(f => f.id === friendId);
        if (!friend) return;
        state.editingFriendId = friendId;
        tempFriend = { ...friend };
        document.getElementById('friendModalTitle').innerText = "编辑好友资料";
        document.getElementById('friendAvatarPreview').src = friend.avatar || DEFAULT_AVATAR;
        document.getElementById('friendNameInput').value = friend.name;
        document.getElementById('friendRemarkInput').value = friend.remark || "";
        document.getElementById('friendPersonaInput').value = friend.persona || "";
        document.getElementById('friendModal').style.display = 'flex';
    }

    function closeFriendModal() {
        document.getElementById('friendModal').style.display = 'none';
        state.editingFriendId = null;
    }

    function saveFriend() {
        const name = document.getElementById('friendNameInput').value.trim();
        if (!name) { alert("请填写昵称"); return; }

        const friendData = {
            name,
            remark: document.getElementById('friendRemarkInput').value.trim() || name,
            avatar: tempFriend.avatar || DEFAULT_AVATAR,
            persona: document.getElementById('friendPersonaInput').value.trim()
        };

        if (state.editingFriendId) {
            // 编辑模式
            const idx = state.friends.findIndex(f => f.id === state.editingFriendId);
            if (idx !== -1) {
                state.friends[idx] = { ...state.friends[idx], ...friendData };
            }
        } else {
            // 新增模式
            state.friends.unshift({
                id: Date.now(),
                ...friendData,
                lastMsg: "",
                history: []
            });
        }

        saveData();
        renderChatList();
        if (state.currentChatId === state.editingFriendId) {
            document.getElementById('pageTitle').innerText = friendData.remark;
            renderMessages();
        }
        closeFriendModal();
    }

    // ================= 设置页 =================
    function loadSettingsUI() {
        document.getElementById('myAvatarPreview').src = state.myProfile.avatar || DEFAULT_AVATAR;
        document.getElementById('myNameInput').value = state.myProfile.name;
        document.getElementById('apiKeyInput').value = state.apiConfig.key;
        document.getElementById('modelNameInput').value = state.apiConfig.model;
    }

    function saveSettings() {
        state.myProfile.name = document.getElementById('myNameInput').value.trim() || "我";
        state.apiConfig.key = document.getElementById('apiKeyInput').value.trim();
        state.apiConfig.model = document.getElementById('modelNameInput').value.trim() || "Qwen/Qwen2.5-7B-Instruct";
        saveData();
        alert("✅ 设置已保存");
        renderMessages();
    }

    function clearAllData() {
        if (confirm("确定要清除所有数据吗？聊天记录和好友将被永久删除！")) {
            localStorage.removeItem('wx_clone_pro_data');
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
