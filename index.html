<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>仿微信 AI 助手 Dark</title>
    <style>
        :root {
            --wechat-green: #07C160;
            --bg-color: #111111;
            --white: #1E1E1E;
            --text-main: #EAEAEA;
            --text-sub: #7A7A7A;
            --border: #2C2C2C;
            --msg-self: #3EB258;
            --input-bg: #2A2A2A;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; justify-content: center; 
            overflow: hidden; color: var(--text-main);
        }
        #app { width: 100%; max-width: 450px; height: 100%; background: var(--bg-color); display: flex; flex-direction: column; position: relative; }
        header { height: 50px; background: var(--bg-color); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-weight: bold; font-size: 17px; color: var(--text-main); border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0; }
        .header-btn { font-size: 22px; cursor: pointer; color: var(--text-main); width: 30px; text-align: center; }
        .back-btn { display: none; font-size: 14px; width: auto; }
        main { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; min-height: 0; }
        .page { display: none; height: 100%; flex-direction: column; background: var(--bg-color); }
        .page.active { display: flex; }
        .chat-item { display: flex; align-items: center; padding: 12px 15px; background: var(--white); border-bottom: 1px solid var(--border); cursor: pointer; }
        .chat-item:active { background: #2A2A2A; }
        .avatar { width: 48px; height: 48px; border-radius: 6px; background: #333; object-fit: cover; flex-shrink: 0; }
        .chat-info { margin-left: 12px; flex: 1; overflow: hidden; }
        .chat-name { font-size: 16px; color: var(--text-main); margin-bottom: 4px; }
        .chat-msg { font-size: 13px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .message-list { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .msg-row { display: flex; align-items: flex-start; max-width: 85%; }
        .msg-row.self { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 10px 14px; border-radius: 6px; font-size: 15px; line-height: 1.5; word-break: break-all; background: var(--white); color: var(--text-main); margin: 0 10px; white-space: pre-wrap; }
        .msg-row.self .msg-bubble { background: var(--msg-self); color: #fff; }
        .input-area { background: var(--bg-color); padding: 10px 10px calc(10px + var(--safe-bottom)); display: flex; align-items: center; border-top: 1px solid var(--border); flex-shrink: 0; transition: none !important; }
        .input-area input { flex: 1; height: 36px; border-radius: 4px; border: none; padding: 0 10px; font-size: 16px; background: var(--input-bg); color: var(--text-main); caret-color: var(--wechat-green); }
        .send-btn { margin-left: 10px; padding: 6px 15px; background: var(--wechat-green); color: white; border: none; border-radius: 4px; font-size: 14px; opacity: 0.6; pointer-events: none; flex-shrink: 0; }
        .send-btn.active { opacity: 1; pointer-events: auto; }
        .typing { font-size: 12px; color: var(--text-sub); padding: 0 15px 5px; display: none; flex-shrink: 0; }
        .form-group { background: var(--white); margin-top: 10px; padding: 0 15px; }
        .form-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); font-size: 16px; }
        .form-item:last-child { border-bottom: none; }
        .form-item label { color: var(--text-main); flex-shrink: 0; margin-right: 10px; }
        .form-item input, .form-item textarea { border: none; text-align: right; font-size: 15px; color: var(--text-sub); width: 70%; background: transparent; resize: none; }
        .form-item textarea { text-align: left; width: 100%; margin-top: 5px; font-size: 14px; line-height: 1.4; color: var(--text-main); }
        .form-item.full { flex-direction: column; align-items: flex-start; }
        .avatar-picker { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .avatar-picker img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: #333; }
        .avatar-picker span { font-size: 14px; color: var(--text-sub); }
        .action-btn { margin: 20px 15px; padding: 12px; background: var(--wechat-green); color: white; border: none; border-radius: 6px; font-size: 16px; width: calc(100% - 30px); cursor: pointer; }
        .danger-btn { background: #D93F3F; }
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: var(--white); width: 90%; max-height: 85vh; border-radius: 8px; padding: 20px; overflow-y: auto; }
        .modal h3 { margin-bottom: 15px; font-size: 17px; text-align: center; color: var(--text-main); }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
        .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
        .btn-cancel { background: #333; color: var(--text-main); }
        .btn-confirm { background: var(--wechat-green); color: white; }
        footer { height: calc(55px + var(--safe-bottom)); padding-bottom: var(--safe-bottom); background: var(--bg-color); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sub); font-size: 10px; cursor: pointer; }
        .tab.active { color: var(--wechat-green); }
        .tab-icon { font-size: 24px; margin-bottom: 2px; }
    </style>
</head>
<body>
<div id="app">
    <header>
        <div class="header-btn back-btn" id="backBtn" onclick="goBack()">〈</div>
        <span id="pageTitle">微信</span>
        <div class="header-btn" id="addBtn" onclick="openAddFriendModal()">＋</div>
    </header>
    <main>
        <div id="page-chat-list" class="page active"><div id="chatListContainer" style="overflow-y:auto;height:100%;"></div></div>
        <div id="page-chat-detail" class="page">
            <div class="message-list" id="messageList"></div>
            <div class="typing" id="typingIndicator">对方正在输入...</div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="输入消息..." oninput="toggleSendBtn()">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
        <div id="page-settings" class="page" style="overflow-y:auto;">
            <div class="form-group">
                <div class="form-item"><label>我的头像</label><div class="avatar-picker" onclick="triggerUpload('myAvatarUpload')"><img id="myAvatarPreview" src=""><span>点击更换</span></div><input type="file" id="myAvatarUpload" accept="image/*" style="display:none" onchange="handleImageUpload(this,'myAvatarPreview','myProfile.avatar')"></div>
                <div class="form-item"><label>我的昵称</label><input type="text" id="myNameInput" placeholder="我"></div>
            </div>
            <div class="form-group">
                <div class="form-item"><label>API Key</label><input type="password" id="apiKeyInput" placeholder="sk-..."></div>
                <div class="form-item"><label>模型名称</label><input type="text" id="modelNameInput" placeholder="Qwen/Qwen2.5-7B-Instruct"></div>
            </div>
            <button class="action-btn" onclick="saveSettings()">保存设置</button>
            <button class="action-btn danger-btn" onclick="clearAllData()">清除所有数据</button>
        </div>
    </main>
    <footer id="mainFooter">
        <div class="tab active" onclick="switchTab('chat')"><div class="tab-icon">💬</div><span>微信</span></div>
        <div class="tab" onclick="switchTab('settings')"><div class="tab-icon">⚙️</div><span>设置</span></div>
    </footer>
    <div class="modal-overlay" id="friendModal">
        <div class="modal">
            <h3 id="friendModalTitle">添加好友</h3>
            <div class="form-group" style="margin-top:0;border:1px solid var(--border);border-radius:6px;">
                <div class="form-item"><label>头像</label><div class="avatar-picker" onclick="triggerUpload('friendAvatarUpload')"><img id="friendAvatarPreview" src=""><span>选择图片</span></div><input type="file" id="friendAvatarUpload" accept="image/*" style="display:none" onchange="handleImageUpload(this,'friendAvatarPreview','tempFriend.avatar')"></div>
                <div class="form-item"><label>昵称</label><input type="text" id="friendNameInput" placeholder="例如：苏东坡"></div>
                <div class="form-item"><label>备注</label><input type="text" id="friendRemarkInput" placeholder="显示在列表的名称"></div>
                <div class="form-item full"><label>🎭 人设 (System Prompt)</label><textarea id="friendPersonaInput" rows="4" placeholder="例如：你是北宋文学家苏轼..."></textarea></div>
            </div>
            <div class="modal-btns"><button class="btn-cancel" onclick="closeFriendModal()">取消</button><button class="btn-confirm" onclick="saveFriend()">确定</button></div>
        </div>
    </div>
</div>

<script>
    const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23333' width='100' height='100'/%3E%3Ctext x='50' y='55' font-size='40' text-anchor='middle' fill='%23777'%3E%3F%3C/text%3E%3C/svg%3E";
    let state = { myProfile:{name:"我",avatar:""}, apiConfig:{key:"",model:"Qwen/Qwen2.5-7B-Instruct"}, friends:[], currentChatId:null, editingFriendId:null };
    let tempFriend = { avatar:"" };

    function init(){
        const saved = localStorage.getItem('wx_clone_pro_data');
        if(saved){try{Object.assign(state,JSON.parse(saved))}catch(e){}}
        if(!state.friends.length){
            state.friends=[{id:Date.now(),name:"硅基助手",remark:"硅基助手",avatar:"https://api.dicebear.com/7.x/bottts/svg?seed=AI",persona:"你是一个友好的AI助手，回答简洁专业。",lastMsg:"你好！有什么可以帮你的？",history:[]}]
        }
        if(!state.myProfile.avatar) state.myProfile.avatar="https://api.dicebear.com/7.x/avataaars/svg?seed=Me";
        renderChatList(); 
        loadSettingsUI();
        
        // vivo/安卓专属：实时同步视口高度
        if(window.visualViewport){
            window.visualViewport.addEventListener('resize',()=>{
                document.getElementById('app').style.height = `${window.visualViewport.height}px`;
                if(state.currentChatId) scrollToBottom();
            });
            window.visualViewport.addEventListener('scroll',()=>window.scrollTo(0,0));
        }
        window.addEventListener('resize',()=>{if(state.currentChatId)setTimeout(scrollToBottom,50)});
        
        // vivo专属：blur守卫防止键盘意外收起
        const input = document.getElementById('msgInput');
        let isSending = false;
        input.addEventListener('blur', () => {
            if (isSending) {
                setTimeout(() => {
                    input.focus();
                    isSending = false;
                }, 50);
            }
        });
        window._setSending = (val) => { isSending = val; };
    }
    
    function saveData(){try{localStorage.setItem('wx_clone_pro_data',JSON.stringify(state))}catch(e){alert("存储空间不足！")}}
    function scrollToBottom(){const l=document.getElementById('messageList');requestAnimationFrame(()=>{l.scrollTop=l.scrollHeight})}
    function triggerUpload(id){document.getElementById(id).click()}
    
    // ✅ 已修复：恢复正确的 file 读取逻辑和 state 路径解析
    function handleImageUpload(input, previewId, path){
        const file = input.files[0];
        if(!file) return;
        if(file.size > 500*1024){
            alert("图片需小于500KB");
            input.value = '';
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById(previewId).src = e.target.result;
            const keys = path.split('.');
            if(keys[0] === 'tempFriend'){
                tempFriend[keys[1]] = e.target.result;
            } else {
                state[keys[0]][keys[1]] = e.target.result;
            }
        };
        reader.readAsDataURL(file);
    }

    function switchTab(tab){
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById('mainFooter').style.display='flex';
        document.getElementById('backBtn').style.display='none';
        document.getElementById('addBtn').style.display= tab==='chat' ? 'block' : 'none';
        if(tab==='chat'){
            document.getElementById('page-chat-list').classList.add('active');
            document.querySelector('.tab:nth-child(1)').classList.add('active');
            document.getElementById('pageTitle').innerText="微信";
        }else{
            document.getElementById('page-settings').classList.add('active');
            document.querySelector('.tab:nth-child(2)').classList.add('active');
            document.getElementById('pageTitle').innerText="设置";
        }
    }
    function openChat(id){
        state.currentChatId=id;
        const f=state.friends.find(x=>x.id===id);
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById('page-chat-detail').classList.add('active');
        document.getElementById('mainFooter').style.display='none';
        document.getElementById('backBtn').style.display='block';
        document.getElementById('addBtn').style.display='none';
        document.getElementById('pageTitle').innerText=f.remark||f.name;
        renderMessages();
        document.getElementById('msgInput').value='';
        toggleSendBtn();
        setTimeout(scrollToBottom,100);
    }
    function goBack(){state.currentChatId=null;switchTab('chat');renderChatList()}
    function renderChatList(){
        const c=document.getElementById('chatListContainer');
        if(!state.friends.length){c.innerHTML='<div style="text-align:center;padding:60px;color:#777;font-size:14px;">暂无好友<br>点击右上角 ＋ 添加</div>';return}
        c.innerHTML=state.friends.map(f=>`<div class="chat-item" onclick="openChat(${f.id})"><img class="avatar" src="${f.avatar||DEFAULT_AVATAR}"><div class="chat-info"><div class="chat-name">${f.remark||f.name}</div><div class="chat-msg">${f.lastMsg||''}</div></div></div>`).join('');
    }
    function renderMessages(){
        const f=state.friends.find(x=>x.id===state.currentChatId);
        if(!f)return;
        document.getElementById('messageList').innerHTML=f.history.map(m=>`<div class="msg-row ${m.role==='user'?'self':''}"><img class="avatar" style="width:40px;height:40px;cursor:pointer;" src="${m.role==='user'?state.myProfile.avatar:f.avatar}" onclick="${m.role==='assistant'?`openEditFriendModal(${f.id})`:''}" onerror="this.src='${DEFAULT_AVATAR}'"><div class="msg-bubble">${escapeHtml(m.content)}</div></div>`).join('');
        scrollToBottom();
    }
    function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
    function toggleSendBtn(){document.getElementById('sendBtn').classList.toggle('active',!!document.getElementById('msgInput').value.trim())}

    async function sendMessage(){
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text||!state.currentChatId) return;
        
        if(window._setSending) window._setSending(true);
        
        const f = state.friends.find(x=>x.id===state.currentChatId);
        f.history.push({role:'user',content:text});
        f.lastMsg = text;
        input.value = '';
        toggleSendBtn();
        renderMessages();
        saveData();

        setTimeout(() => { input.focus(); }, 60);

        if(!state.apiConfig.key){alert("请先在设置中填写API Key");if(window._setSending)window._setSending(false);return}
        document.getElementById('typingIndicator').style.display='block';
        scrollToBottom();

        try{
            const msgs=[];
            if(f.persona) msgs.push({role:'system',content:f.persona});
            msgs.push(...f.history.slice(-20).map(m=>({role:m.role==='user'?'user':'assistant',content:m.content})));
            const res=await fetch("https://api.siliconflow.cn/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${state.apiConfig.key}`},body:JSON.stringify({model:state.apiConfig.model,messages:msgs,stream:false})});
            if(!res.ok) throw new Error(`API ${res.status}`);
            const data=await res.json();
            // ✅ 已修复：补全正确的 API 返回路径
            const reply = data.choices[0].message.content;
            f.history.push({role:'assistant',content:reply});
            f.lastMsg=reply.length>20?reply.substring(0,20)+'...':reply;
        }catch(err){
            f.history.push({role:'assistant',content:`[错误] ${err.message}`});
            f.lastMsg="[请求失败]";
        }finally{
            document.getElementById('typingIndicator').style.display='none';
            renderMessages();
            saveData();
            setTimeout(() => { input.focus(); }, 60);
            setTimeout(() => { if(window._setSending) window._setSending(false); }, 300);
        }
    }

    document.getElementById('msgInput').addEventListener('keypress',e=>{if(e.key==='Enter')sendMessage()});
    function openAddFriendModal(){state.editingFriendId=null;tempFriend={avatar:"",name:"",remark:"",persona:""};document.getElementById('friendModalTitle').innerText="添加AI好友";document.getElementById('friendAvatarPreview').src=DEFAULT_AVATAR;['friendNameInput','friendRemarkInput','friendPersonaInput'].forEach(id=>document.getElementById(id).value="");document.getElementById('friendModal').style.display='flex'}
    function openEditFriendModal(id){const f=state.friends.find(x=>x.id===id);if(!f)return;state.editingFriendId=id;tempFriend={...f};document.getElementById('friendModalTitle').innerText="编辑好友资料";document.getElementById('friendAvatarPreview').src=f.avatar||DEFAULT_AVATAR;document.getElementById('friendNameInput').value=f.name;document.getElementById('friendRemarkInput').value=f.remark||"";document.getElementById('friendPersonaInput').value=f.persona||"";document.getElementById('friendModal').style.display='flex'}
    function closeFriendModal(){document.getElementById('friendModal').style.display='none';state.editingFriendId=null}
    function saveFriend(){const name=document.getElementById('friendNameInput').value.trim();if(!name){alert("请填写昵称");return}const data={name,remark:document.getElementById('friendRemarkInput').value.trim()||name,avatar:tempFriend.avatar||DEFAULT_AVATAR,persona:document.getElementById('friendPersonaInput').value.trim()};if(state.editingFriendId){const idx=state.friends.findIndex(f=>f.id===state.editingFriendId);if(idx!==-1)state.friends[idx]={...state.friends[idx],...data}}else{state.friends.unshift({id:Date.now(),...data,lastMsg:"",history:[]})}saveData();renderChatList();if(state.currentChatId===state.editingFriendId){document.getElementById('pageTitle').innerText=data.remark;renderMessages()}closeFriendModal()}
    function loadSettingsUI(){document.getElementById('myAvatarPreview').src=state.myProfile.avatar||DEFAULT_AVATAR;document.getElementById('myNameInput').value=state.myProfile.name;document.getElementById('apiKeyInput').value=state.apiConfig.key;document.getElementById('modelNameInput').value=state.apiConfig.model}
    function saveSettings(){state.myProfile.name=document.getElementById('myNameInput').value.trim()||"我";state.apiConfig.key=document.getElementById('apiKeyInput').value.trim();state.apiConfig.model=document.getElementById('modelNameInput').value.trim()||"Qwen/Qwen2.5-7B-Instruct";saveData();alert("✅ 设置已保存");renderMessages()}
    function clearAllData(){if(confirm("确定清除所有数据？")){localStorage.removeItem('wx_clone_pro_data');location.reload()}}
    
    init();
</script>
</body>
</html>
